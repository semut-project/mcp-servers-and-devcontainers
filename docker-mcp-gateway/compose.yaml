services:
  mcp-gateway:
    image: docker/mcp-gateway:latest
    command:
      - --transport=streaming
      - --port=8090
      - --servers=puppeteer,context7,playwright,aws-diagram-mcp-server,memory-reference,javadocs,markitdown,ffmpeg,hugging-face,microsoft-learn,paper-search 
    environment:
      - DOCKER_MCP_IN_CONTAINER=1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8090:8090"