services:
  gateway:
    image: docker/mcp-gateway
    command:
      - --transport=streaming
      - --port=8090
      - --servers=puppeteer,context7
      - --verbose=false
    environment:
      # Useful when you run this outside Docker Desktop (Docker Engine / Linux / WSL2),
      # to bypass “Docker Desktop is not running” checks.
      - DOCKER_MCP_IN_CONTAINER=1
    volumes:
      # Required: lets the gateway start/stop MCP server containers on the host
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "8090:8090"