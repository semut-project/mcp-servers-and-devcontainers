networks:
  roocode-network:
    driver: bridge

volumes:
  qdrant_storage:
  ollama:

services:
  qdrant:
    image: qdrant/qdrant
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage     
    restart: unless-stopped
    networks:
      - roocode-network
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: 0.5

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
    restart: unless-stopped
    networks:
      - roocode-network
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: 0.5


